<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的本地私密菜单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            font-family: "Microsoft YaHei", sans-serif; 
            padding: 15px; 
            background: #fff;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        /* 分类标签样式 */
        .category {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .cat-btn {
            padding: 8px 12px;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
        }
        .cat-btn.active {
            background: #007bff;
            color: white;
        }

        /* 菜品样式 */
        .item { 
            display: flex; 
            border-bottom: 1px solid #eee; 
            padding: 10px 0; 
            align-items: center;
        }
        .item img { 
            width: 80px; 
            height: 80px; 
            object-fit: cover;
            border-radius: 8px; 
            margin-right: 15px; 
        }
        .info { flex-grow: 1; }
        .info div:first-child{
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        .price { 
            color: #f40; 
            font-weight: bold; 
            font-size: 18px;
        }
        .btn { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover{
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h2>📖 今日菜单（分类版）</h2>

    <!-- 分类按钮 -->

        <button class="cat-btn" onclick="showCategory('rice')">主食类</button>
        <button class="cat-btn" onclick="showCategory('snack')">点心类</button>
    </div>

    <script>
        // 点单功能
        function order(name) {
            alert('✅ 点单成功！\n菜品：' + name + '\n请直接告知老板即可~');
        }

        // 分类切换功能
        function showCategory(cat) {
            let items = document.querySelectorAll('.item');
            let btns = document.querySelectorAll('.cat-btn');
            
            // 按钮高亮
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // 显示隐藏菜品
            items.forEach(item => {
                if(cat === 'all' || item.getAttribute('data-cat') === cat) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
   <script>
// 【标准推送】和你的"爱心饭店"应用绑定，支持中文、不依赖浏览器跨域
function order(dishName) {
    // 1. 给顾客的点单成功提示
    alert("✅ 点单成功！\n菜品：" + dishName + "\n我们已收到您的订单~");

    // 2. 你的WxPusher应用信息，替换成你自己的！
    const APP_TOKEN = "你的AppToken（AT_开头）";
    const YOUR_UID = "你的UID（一串数字）";

    // 3. 组装订单消息内容（带时间，方便你查看）
    const orderMessage = `📌 新订单通知\n----------------\n菜品：${dishName}\n下单时间：${new Date().toLocaleString()}`;

    // 4. 用POST方式调用WxPusher API，100%能发送成功
    fetch("https://wxpusher.zjiecode.com/api/send/message", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            appToken: APP_TOKEN,
            uids: [YOUR_UID],
            content: orderMessage,
            summary: `新订单：${dishName}`,
            contentType: 1 // 1=文本消息
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log("推送结果：", data);
        // 你可以在浏览器F12控制台看到是否发送成功
    })
    .catch(error => {
        console.error("推送失败：", error);
    });
}
</script>
